openapi: 3.1.0
info:
  title: Synaptic Core — Objects API
  version: 1.0.0
  description: Domain-agnostic API for stable object identity, metadata, and byte-range binary streaming. Proposed standard, licensed under CC0 1.0 Universal.

  contact:
    name: Synaptic Four
    url: https://synapticfour.com
    email: standards@synapticfour.com
  license:
    name: CC0 1.0 Universal
    url: https://creativecommons.org/publicdomain/zero/1.0/
servers:
  - url: /sc/objects/v1
    description: Default mount point (configurable per deployment)
tags:
  - name: objects
    description: Object registration, lookup, and deletion operations.
  - name: streaming
    description: Object byte-stream retrieval operations.
paths:
  /objects/ingest:
    post:
      tags: [objects]
      summary: Ingest a new object (upload content)
      description: Upload binary content and create a stable SC object record.
      operationId: ingestObject
      x-synaptic-core-stability: stable
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: {type: string}
                mime_type: {type: string}
                metadata: {type: object, additionalProperties: true}
                encrypt: {type: boolean, default: false}
                data: {type: string, format: binary}
              required: [name, data]
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/ObjectMetadata'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '413': {$ref: '#/components/responses/PayloadTooLarge'}
        '500': {$ref: '#/components/responses/InternalError'}
  /objects/register:
    post:
      tags: [objects]
      summary: Register an externally-hosted object (no upload)
      description: Register metadata and access methods for externally-hosted content.
      operationId: registerExternalObject
      x-synaptic-core-stability: stable
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterObjectRequest'}
      responses:
        '201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/ObjectMetadata'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/InternalError'}
  /objects/{id}:
    get:
      tags: [objects]
      summary: Retrieve object metadata
      description: Return metadata for a single object by ULID.
      operationId: getObjectMetadata
      x-synaptic-core-stability: stable
      parameters: [{$ref: '#/components/parameters/ObjectId'}]
      responses:
        '200': {description: Metadata, content: {application/json: {schema: {$ref: '#/components/schemas/ObjectMetadata'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}
    delete:
      tags: [objects]
      summary: Delete object content (metadata + provenance node persists)
      description: Remove object payload while preserving metadata and provenance lineage references.
      operationId: deleteObject
      x-synaptic-core-stability: stable
      security: [{bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/ObjectId'}]
      responses:
        '204': {description: Deleted}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}
  /objects/{id}/stream:
    get:
      tags: [streaming]
      summary: Stream object content (full or byte-range)
      description: Stream full content or satisfy HTTP byte-range requests.
      operationId: streamObject
      x-synaptic-core-stability: stable
      parameters:
        - $ref: '#/components/parameters/ObjectId'
        - in: header
          name: Range
          schema: {type: string}
          required: false
          description: Optional HTTP Range header in bytes=start-end form.
      responses:
        '200':
          description: Full content stream
          headers:
            x-synaptic-core-encrypted:
              schema: {type: boolean}
              description: true when content was stored encrypted and decrypted on-the-fly.
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        '206':
          description: Partial content stream (range satisfied)
          headers:
            Content-Range:
              schema: {type: string}
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        '302': {description: Redirect to external access URL}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '416':
          description: Range not satisfiable
          headers:
            Content-Range:
              schema: {type: string}
              example: bytes */123456
          content:
            application/problem+json:
              schema: {$ref: '#/components/schemas/ProblemDetails'}
        '500': {$ref: '#/components/responses/InternalError'}
  /objects:
    get:
      tags: [objects]
      summary: List objects (paginated)
      description: Return a paginated list of object metadata records.
      operationId: listObjects
      x-synaptic-core-stability: stable
      parameters:
        - in: query
          name: limit
          schema: {type: integer, default: 20, minimum: 1, maximum: 100}
        - in: query
          name: offset
          schema: {type: integer, default: 0, minimum: 0}
        - in: query
          name: mime_type
          schema: {type: string}
      responses:
        '200':
          description: Object list
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects: {type: array, items: {$ref: '#/components/schemas/ObjectMetadata'}}
                  total: {type: integer}
                  limit: {type: integer}
                  offset: {type: integer}
                required: [objects, total, limit, offset]
        '400': {$ref: '#/components/responses/BadRequest'}
        '500': {$ref: '#/components/responses/InternalError'}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ObjectId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
  responses:
    BadRequest:
      description: Bad request
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}
    Unauthorized:
      description: Unauthorized
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}
    Forbidden:
      description: Forbidden
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}
    NotFound:
      description: Not found
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}
    PayloadTooLarge:
      description: Object exceeds configured maximum size
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}
    InternalError:
      description: Internal server error
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}
  schemas:
    ProblemDetails:
      type: object
      description: RFC 9457 Problem Details.
      properties:
        type: {type: string}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        instance: {type: string}
      required: [title, status]
    Checksum:
      type: object
      properties:
        type: {type: string, enum: [md5, sha256, sha512, ga4gh_sha512t24u]}
        checksum: {type: string}
      required: [type, checksum]
    AccessMethod:
      type: object
      properties:
        type: {type: string, enum: [sc_stream, https, s3, gs, ftp]}
        url: {type: string, format: uri}
      required: [type, url]
    ObjectMetadata:
      type: object
      properties:
        id: {type: string, example: 01KMAZ9WKAVNVE94E054SM77VZ}
        name: {type: string}
        size_bytes: {type: integer, format: int64}
        mime_type: {type: [string, 'null']}
        checksums: {type: array, items: {$ref: '#/components/schemas/Checksum'}}
        is_encrypted: {type: boolean}
        created_at: {type: string, format: date-time}
        access_methods: {type: array, items: {$ref: '#/components/schemas/AccessMethod'}}
        metadata: {type: object, additionalProperties: true}
        provenance_node_id: {type: string}
      required: [id, name, size_bytes, checksums, is_encrypted, created_at, access_methods, metadata, provenance_node_id]
    RegisterObjectRequest:
      type: object
      properties:
        name: {type: string}
        mime_type: {type: [string, 'null']}
        size_bytes: {type: integer, format: int64}
        checksums: {type: array, items: {$ref: '#/components/schemas/Checksum'}}
        access_methods: {type: array, items: {$ref: '#/components/schemas/AccessMethod'}}
        metadata: {type: object, additionalProperties: true}
      required: [name, size_bytes, checksums, access_methods]
