openapi: 3.1.0
info:
  title: Synaptic Core — Query API
  version: 1.0.0
  description: Schema-agnostic federated query API. Adapters publish field schemas; the primitive remains domain-neutral. Proposed standard under CC0 1.0 Universal.

  contact:
    name: Synaptic Four
    url: https://synapticfour.com
    email: standards@synapticfour.com
  license:
    name: CC0 1.0 Universal
    url: https://creativecommons.org/publicdomain/zero/1.0/
servers:
  - url: /sc/query/v1
    description: Default mount point (configurable per deployment)
tags:
  - name: query
    description: Query execution operations.
  - name: schema
    description: Queryable field schema discovery.
  - name: federation
    description: Federation node discovery and registration.
paths:
  /query:
    post:
      tags: [query]
      summary: Execute query
      description: Execute a schema-free filter query against local or federated targets.
      operationId: executeQuery
      x-synaptic-core-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/QueryRequest'}
      responses:
        '200': {description: Query results, content: {application/json: {schema: {$ref: '#/components/schemas/QueryResponse'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '500': {$ref: '#/components/responses/InternalError'}
  /fields:
    get:
      tags: [schema]
      summary: List queryable fields and their types
      description: Return adapter-registered field schemas for the target entity type.
      operationId: listFields
      x-synaptic-core-stability: stable
      parameters:
        - in: query
          name: target
          schema: {$ref: '#/components/schemas/QueryTarget'}
      responses:
        '200':
          description: Field schema list
          content:
            application/json:
              schema:
                type: object
                properties:
                  fields: {type: array, items: {$ref: '#/components/schemas/FieldSchema'}}
                required: [fields]
        '400': {$ref: '#/components/responses/BadRequest'}
        '500': {$ref: '#/components/responses/InternalError'}
  /nodes:
    get:
      tags: [federation]
      summary: List registered federation peers
      description: Return known peer nodes used for federated query execution.
      operationId: listFederationNodes
      x-synaptic-core-stability: stable
      responses:
        '200':
          description: Federation nodes
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes: {type: array, items: {$ref: '#/components/schemas/NodeInfo'}}
                required: [nodes]
        '400': {$ref: '#/components/responses/BadRequest'}
        '500': {$ref: '#/components/responses/InternalError'}
    post:
      tags: [federation]
      summary: Register a federation peer
      description: Register a peer node for optional federated query fan-out.
      operationId: registerFederationNode
      x-synaptic-core-stability: stable
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string}
                base_url: {type: string, format: uri}
                description: {type: [string, 'null']}
              required: [name, base_url]
      responses:
        '201': {description: Registered node, content: {application/json: {schema: {$ref: '#/components/schemas/NodeInfo'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
        '500': {$ref: '#/components/responses/InternalError'}
components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}
  responses:
    BadRequest: {description: Bad request, content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}}
    Unauthorized: {description: Unauthorized, content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}}
    Forbidden: {description: Forbidden, content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}}
    Conflict: {description: Conflict, content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}}
    InternalError: {description: Internal error, content: {application/problem+json: {schema: {$ref: '#/components/schemas/ProblemDetails'}}}}
  schemas:
    ProblemDetails:
      type: object
      properties:
        type: {type: string}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
      required: [title, status]
    QueryTarget:
      type: string
      enum: [objects, tasks, runs, tools]
      default: objects
    FilterOperator:
      type: string
      enum: [eq, neq, gt, gte, lt, lte, contains, starts_with, in, not_in, exists]
    Filter:
      type: object
      properties:
        field: {type: string, example: metadata.organism}
        operator: {$ref: '#/components/schemas/FilterOperator'}
        value: true
      required: [field, operator]
    Pagination:
      type: object
      properties:
        limit: {type: integer, default: 20, minimum: 1, maximum: 100}
        offset: {type: integer, default: 0, minimum: 0}
    QueryRequest:
      type: object
      properties:
        target: {$ref: '#/components/schemas/QueryTarget'}
        filters: {type: array, items: {$ref: '#/components/schemas/Filter'}}
        pagination: {$ref: '#/components/schemas/Pagination'}
        federation: {type: boolean, default: false}
        order_by: {type: string}
        order_dir: {type: string, enum: [asc, desc], default: asc}
    FederationSource:
      type: object
      properties:
        node_id: {type: string}
        node_name: {type: string}
        result_count: {type: integer}
      required: [node_id, node_name, result_count]
    QueryResponse:
      type: object
      properties:
        results: {type: array, items: {type: object, additionalProperties: true}}
        total: {type: integer}
        limit: {type: integer}
        offset: {type: integer}
        federation_sources:
          type: [array, 'null']
          items: {$ref: '#/components/schemas/FederationSource'}
      required: [results, total, limit, offset, federation_sources]
    FieldSchema:
      type: object
      properties:
        field: {type: string}
        type: {type: string}
        description: {type: [string, 'null']}
      required: [field, type, description]
    NodeInfo:
      type: object
      properties:
        id: {type: string}
        name: {type: string}
        base_url: {type: string, format: uri}
        description: {type: [string, 'null']}
      required: [id, name, base_url, description]
