name: Dependabot Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: dependabot-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: NPM smoke
        run: |
          set -e
          found=0
          for d in $(git ls-files "**/package.json" | xargs -n1 dirname | sort -u); do
            if [ -f "$d/package-lock.json" ]; then
              found=1
              (cd "$d" && npm ci --ignore-scripts && npm run -s lint --if-present && npm test --if-present -- --watch=false)
            fi
          done
          if [ "$found" -eq 0 ]; then echo "No npm lockfiles found; skipping npm smoke."; fi
